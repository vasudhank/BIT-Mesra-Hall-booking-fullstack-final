services:
  - type: web
    name: hall-booking-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/ops/health
    autoDeploy: true

  - type: web
    name: hall-booking-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        value: https://hall-booking-backend-7fui.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
